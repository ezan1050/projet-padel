<h2 class="h4 mb-3">Administration</h2>

@if (message) {
  <div class="alert alert-info">{{ message }}</div>
}

<div class="card shadow-sm mb-4">
  <div class="card-body">
    <h3 class="h6 mb-3">Creer un match</h3>

    <div class="row g-2">
      <div class="col-md-3">
        <label class="form-label small">Date</label>
        <input type="date" class="form-control" [(ngModel)]="nouveauMatch.date" name="date">
      </div>
      <div class="col-md-3">
        <label class="form-label small">Heure</label>
        <input type="time" class="form-control" [(ngModel)]="nouveauMatch.heureDebut" name="heure">
      </div>
      <div class="col-md-2">
        <label class="form-label small">Prix</label>
        <input type="number" class="form-control" [(ngModel)]="nouveauMatch.prix" name="prix">
      </div>
      <div class="col-md-2">
        <label class="form-label small">Type</label>
        <select class="form-select" [(ngModel)]="nouveauMatch.type" name="type">
          <option value="PUBLIC">Public</option>
          <option value="PRIVE">Prive</option>
        </select>
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button class="btn btn-success w-100" (click)="creerMatch()">Creer</button>
      </div>
    </div>

  </div>
</div>

<h3 class="h6 mb-2">Matchs existants</h3>

<table class="table table-hover align-middle">
  <thead>
    <tr>
      <th>Date</th>
      <th>Heure</th>
      <th>Type</th>
      <th>Prix</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    @for (match of matchs(); track match.id) {
      <tr>
        <td>{{ match.date }}</td>
        <td>{{ match.heureDebut }}</td>
        <td>{{ match.type }}</td>
        <td>{{ match.prix }} €</td>
        <td class="text-end">
          <button class="btn btn-sm btn-outline-danger" (click)="supprimerMatch(match.id)">Supprimer</button>
        </td>
      </tr>
    } @empty {
      <tr><td colspan="5" class="text-muted">Aucun match.</td></tr>
    }
  </tbody>
</table>
