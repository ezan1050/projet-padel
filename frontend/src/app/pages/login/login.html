<div class="row justify-content-center">
  <div class="col-md-5">

    <div class="card shadow-sm">
      <div class="card-body">

        <h2 class="card-title h4 mb-3">Connexion</h2>

        <div class="mb-3">
          <label class="form-label">Matricule</label>
          <input type="text" class="form-control" [(ngModel)]="matricule" name="matricule" placeholder="Ex : G0001">
        </div>

        <div class="mb-3">
          <label class="form-label">Mot de passe</label>
          <input type="password" class="form-control" [(ngModel)]="motDePasse" name="motDePasse">
        </div>

        <button class="btn btn-success w-100" (click)="seConnecter()">Se connecter</button>

        @if (message) {
          <div class="alert alert-danger mt-3 mb-0">{{ message }}</div>
        }

      </div>
    </div>

  </div>
</div>
